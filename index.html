<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑鹰不是中二丶</title>
    <style>
        :root {
            --apple-black: #1d1d1f;
            --apple-grey: #86868b;
            --apple-link: #0066cc;
            --apple-bg: #f5f5f7;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro SC","SF Pro Text","Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: var(--apple-black);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 顶部导航条感 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 44px;
            background: rgba(251, 251, 253, 0.8);
            backdrop-filter: blur(20px);
            z-index: 9999;
        }

        /* 主体容器 */
        .container {
            text-align: center;
            padding: 20px;
            max-width: 800px;
            animation: fadeIn 1.2s ease-out;
        }

        /* 标题设计 */
        h1 {
            font-size: 56px;
            font-weight: 600;
            letter-spacing: -0.005em;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #1d1d1f 0%, #434344 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 链接样式 */
        .bili-link {
            font-size: 24px;
            color: var(--apple-link);
            text-decoration: none;
            font-weight: 400;
            display: inline-block;
            margin-bottom: 40px;
            transition: all 0.3s ease;
        }

        .bili-link:hover {
            text-decoration: underline;
        }

        .bili-link::after {
            content: " >";
            font-weight: 600;
        }

        /* 展开区域样式 */
        details {
            margin-top: 20px;
            width: 100%;
            cursor: pointer;
        }

        summary {
            font-size: 21px;
            color: var(--apple-black);
            list-style: none;
            outline: none;
            transition: color 0.3s;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary:hover {
            color: var(--apple-grey);
        }

        .content {
            margin-top: 20px;
            padding: 30px;
            background-color: var(--apple-bg);
            border-radius: 18px;
            transition: transform 0.3s ease;
        }

        .tool-link {
            font-size: 28px;
            font-weight: 600;
            color: var(--apple-black);
            text-decoration: none;
            display: block;
        }

        .tool-link span {
            display: block;
            font-size: 14px;
            color: var(--apple-grey);
            margin-top: 8px;
            font-weight: 400;
        }

        .tool-link:hover {
            opacity: 0.8;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式 */
        @media (max-width: 734px) {
            h1 { font-size: 40px; }
            .bili-link { font-size: 19px; }
        }
    </style>
</head>
<body>

    <nav></nav>

    <div class="container">
        <h1>黑鹰不是中二丶</h1>
        <a href="https://space.bilibili.com/483844988" class="bili-link" target="_blank">前往 Bilibili 频道</a>

        <details>
            <summary>进一步了解</summary>
            <div class="content">
                <a href="/random" class="tool-link">
                    随机挑战
                    <span>创新的随机体验，专为挑战者设计。</span>
                </a>
            </div>
        </details>
    </div>

</body>
</html>
