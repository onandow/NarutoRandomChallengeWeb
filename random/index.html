<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>随机挑战v4    -    黑鹰不是中二丶</title>
    <style>
        /* 全局样式重置 ———— 保持原样，仅增加 .toast-message 和滚动表格类 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f6f9fc 0%, #eef2f7 100%);
            color: #2d3748;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 10px;
            margin: 0;
            min-height: 100vh;
        }

        /* 标题栏 - 更加紧凑 */
        .title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            max-width: 500px;
            margin-bottom: 15px;
        }
        .title-wrapper h2 {
            color: #1a202c;
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
        }
        
        .settings-btn {
            position: absolute;
            right: 5px;
            font-size: 18px;
            cursor: pointer;
            background: #ffffff;
            border-radius: 10px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #eee;
        }

        /* 主抽取按钮 - 减小高度 */
        .btn-group { width: 100%; max-width: 500px; margin-bottom: 12px; }
        #rollBtn {
            width: 100%; padding: 15px; font-size: 18px; font-weight: bold; color: #fff;
            background: linear-gradient(135deg, #0984e3 0%, #0097e6 100%);
            border: none; border-radius: 12px;
            box-shadow: 0 4px 12px rgba(9, 132, 227, 0.2);
            cursor: pointer;
            transition: all 0.1s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #rollBtn:active { transform: scale(0.98); }

        /* 容器卡片 */
        .card-container {
            width: 100%; max-width: 500px; background: #ffffff; padding: 12px;
            border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); margin-bottom: 12px;
            border: 1px solid #f0f0f0;
        }

        /* 结果显示 - 减小内边距 */
        .modifier-result {
            font-size: 19px; font-weight: bold; padding: 15px;
            border-radius: 10px; text-align: center; min-height: 60px; 
            display: flex; align-items: center; justify-content: center;
        }
        .mod-none { color: #a0aec0; background-color: #f8fafc; border: 1px solid #e2e8f0; font-weight: normal; font-size: 15px; }

        /* 配置面板 */
        #config-container { display: none; padding: 12px; }
        .setting-block { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #edf2f7; }
        .setting-title { font-weight: bold; margin-bottom: 8px; display: block; color: #4a5568; font-size: 13px; }

        .trigger-prob { display: flex; align-items: center; justify-content: space-between; }
        .trigger-prob input { width: 60px; height: 32px; border: 1px solid #ddd; border-radius: 6px; text-align: center; }

        /* 新增：可滚动表格容器，固定高度 */
        .config-table-scroll {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #edf2f7;
            border-radius: 8px;
            background: white;
        }

        .config-table { width: 100%; border-collapse: collapse; }
        .config-table th { background: #4a5568; color: white; padding: 8px 4px; font-size: 12px; position: sticky; top: 0; z-index: 1; }
        .config-table td { padding: 6px 4px; border-bottom: 1px solid #eee; }
        .config-table input, .config-table select { width: 100%; border: 1px solid #ddd; border-radius: 4px; padding: 6px; font-size: 12px; }
        
        .color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }

        .action-btns { display: flex; gap: 8px; margin-top: 10px; }
        .add-btn { flex: 1; background: #e6fffa; color: #049f7e; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; border: none; }
        .save-btn { flex: 2; background: #2d3748; color: #fff; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; border: none; }

        .io-btns { display: flex; gap: 6px; margin-top: 8px; }
        .io-btn { flex: 1; background: #f1f2f6; color: #57606f; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: bold; border: 1px solid #dfe4ea; }

        /* 历史记录 - 移除强制滚动，让其自然撑开 */
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .history-header h3 { font-size: 15px; margin: 0; }
        #clearBtn { background-color: #ff7675; color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; border: none; }

        .history-scroll { width: 100%; border-radius: 10px; border: 1px solid #2d3436; overflow: hidden; }
        .history-table { width: 100%; border-collapse: collapse; background: white; }
        .history-table th { background-color: #2d3436; color: #ffffff; padding: 10px; font-size: 13px; }
        .history-table td { padding: 10px; font-size: 13px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        
        .settings-footer { margin-top: 10px; padding-top: 8px; border-top: 1px dashed #ddd; font-size: 11px; color: #a0aec0; text-align: center; }

        /* 新增 toast 样式 ———— 轻柔提示，5秒消失 */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e272e;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 10000;
            transition: opacity 0.2s;
            letter-spacing: 0.3px;
            pointer-events: none;
            white-space: nowrap;
        }

        /* 文件操作按钮行与上一行保持一点间距 (新增) */
        .io-btns + .io-btns {
            margin-top: 6px;
        }

        /* 红字提醒 */
        .reminder-text {
            color: red;
            text-align: center;
            margin: 12px 0 4px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="title-wrapper">
        <h2>随机挑战</h2><h4>v4</h4>
        <div class="settings-btn" onclick="toggleConfig()">⚙️</div>
    </div>

    <div class="btn-group">
        <button id="rollBtn" onclick="generateResults()">随一下</button>
    </div>

    <div class="card-container">
        <div id="res-modifier" class="modifier-result mod-none">【等待抽取】</div>
    </div>

    <div class="card-container" id="config-container">
        <div class="setting-block trigger-prob">
            <span class="setting-title">触发概率</span>
            <div><input type="number" id="triggerProbInput" value="100"> %</div>
        </div>
        
        <div class="setting-block" style="border-bottom:none; padding-bottom:0">
            <span class="setting-title">词条权重设置</span>
            <!-- 添加了 class="config-table-scroll" 以实现固定高度滚动，并保留原有的 overflow-x:auto 属性 -->
            <div style="overflow-x:auto;" class="config-table-scroll">
                <table class="config-table">
                    <thead>
                        <tr>
                            <th width="10%">#</th>          <!-- 新增序号列 -->
                            <th>词条描述</th>
                            <th width="22%">权重</th>
                            <th width="12%">删</th>
                        </tr>
                    </thead>
                    <tbody id="modifierTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="action-btns">
            <button class="add-btn" onclick="addRow()">+ 新增</button>
            <button class="save-btn" onclick="saveConfig()">保存设置</button>
        </div>
        <!-- 新增红色提醒文字 -->
        <div class="reminder-text">记得保存 记得保存 记得保存</div>

        <!-- 第一行：原有复制/粘贴按钮 -->
        <div class="io-btns">
            <button class="io-btn" onclick="exportConfig()">复制配置</button>
            <button class="io-btn" onclick="importConfig()">粘贴导入</button>
        </div>
        <!-- 第二行：新增的文件导入/导出按钮 (完全独立，不影响原有功能) -->
        <div class="io-btns">
            <button class="io-btn" onclick="exportToFile()">📁 导出成文件</button>
            <button class="io-btn" onclick="importFromFile()">📂 从文件导入</button>
        </div>

        <div class="settings-footer">Created by R @1203605850</div>
    </div>

    <div class="card-container">
        <div class="history-header">
            <h3>最近记录</h3>
            <button id="clearBtn" onclick="clearHistory()">清空</button>
        </div>
        <div class="history-scroll">
            <table class="history-table">
                <thead>
                    <tr><th width="30%">时间</th><th width="70%">抽取结果</th></tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const colorPalette = [
            { text: '#d63031', bg: '#fff5f5', border: '#ff7675' },
            { text: '#0984e3', bg: '#f0f8ff', border: '#74b9ff' },
            { text: '#00b894', bg: '#e6fff9', border: '#55efc4' },
            { text: '#6c5ce7', bg: '#f3f0ff', border: '#a29bfe' },
            { text: '#e17055', bg: '#fff3ec', border: '#fab1a0' },
            { text: '#00cec9', bg: '#e0ffff', border: '#81ecec' },
            { text: '#e84393', bg: '#ffeff6', border: '#fd79a8' },
            { text: '#d35400', bg: '#fff2e6', border: '#e67e22' }
        ];

        let triggerProb = 100;
        // 初始词条 (12条，权重均为1)
        let modifiers = [
            { text: '泳装！泳装！泳装！', weight: 1 },
            { text: '你也是叛忍吗', weight: 1 },
            { text: '金发忍者', weight: 1 },
            { text: '面具or面罩', weight: 1 },
            { text: '土遁忍者', weight: 1 },
            { text: '宇智波怎么这么多人', weight: 1 },
            { text: '自来也的徒弟', weight: 1 },
            { text: '带队上忍', weight: 1 },
            { text: '全S随机', weight: 1 },
            { text: '体术忍者', weight: 1 },
            { text: '侠隐漂泊新春夏日的B忍', weight: 1 },
            { text: '上一局对手的配置（想不起来的随机）', weight: 1 }
        ];

        // 记录最近10次有结果的词条（用于避免重复）
        let recentHistory = [];

        // ---------- 新增累积状态 ----------
        let accumulatedParts = [];                 // 存放每次“再抽/再来”提取的部分
        let shouldResetOnNextRoll = false;         // 上次抽到普通词条，下次点击时需先重置按钮

        window.onload = () => {
            const savedTriggerProb = localStorage.getItem('challenge_trigger_prob_v7');
            const savedModifiers = localStorage.getItem('challenge_modifiers_v7');
            if (savedTriggerProb !== null) triggerProb = parseFloat(savedTriggerProb);
            if (savedModifiers) modifiers = JSON.parse(savedModifiers);
            updateConfigUI();
            renderTable();

            // 确保按钮初始文字正确，累积状态重置
            document.getElementById('rollBtn').innerText = '随一下';
            accumulatedParts = [];
            shouldResetOnNextRoll = false;
        };

        // 轻提示 (持续5秒后消失)
        function showToast(msg, duration = 5000) {
            const existing = document.querySelector('.toast-message');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                if (toast.parentNode) toast.remove();
            }, duration);
        }

        function updateConfigUI() { document.getElementById('triggerProbInput').value = triggerProb; }

        // 修改后的 toggleConfig：打开面板时自动滚动到底部
        function toggleConfig() {
            const c = document.getElementById('config-container');
            const willShow = (c.style.display !== 'block'); // 判断即将显示
            c.style.display = willShow ? 'block' : 'none';
            if (willShow) {
                // 打开面板时，自动滚动到表格底部
                setTimeout(() => {
                    const scrollDiv = document.querySelector('.config-table-scroll');
                    if (scrollDiv) {
                        scrollDiv.scrollTop = scrollDiv.scrollHeight;
                    }
                }, 10);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('modifierTableBody');
            tbody.innerHTML = '';
            modifiers.forEach((mod, index) => {
                const colors = colorPalette[index % colorPalette.length];
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="text-align:center; font-weight:500;">${index+1}</td>
                    <td><div style="display:flex;align-items:center;"><span class="color-dot" style="background-color:${colors.text}"></span>
                    <input type="text" value="${mod.text.replace(/"/g, '&quot;')}" class="mod-text"></div></td>
                    <td><select class="mod-weight">
                        <option value="1" ${mod.weight==1?'selected':''}>1</option>
                        <option value="2" ${mod.weight==2?'selected':''}>2</option>
                        <option value="3" ${mod.weight==3?'selected':''}>3</option>
                    </select></td>
                    <td style="text-align:center;"><span style="color:#e53e3e;font-size:18px;cursor:pointer;" onclick="removeRow(${index})">×</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 辅助函数：将当前表格中的所有输入同步到 modifiers 变量（保留未保存的编辑）
        function syncTableToModifiers() {
            const texts = document.querySelectorAll('.mod-text');
            const weights = document.querySelectorAll('.mod-weight');
            const currentMods = [];
            for(let i = 0; i < texts.length; i++) {
                currentMods.push({ 
                    text: texts[i].value,               // 保留输入原样，不 trim，允许临时空白
                    weight: parseInt(weights[i].value) 
                });
            }
            modifiers = currentMods;
        }

        function addRow() {
            syncTableToModifiers();                     // 保存当前所有输入
            modifiers.push({ text: '', weight: 1 });
            renderTable();

            setTimeout(() => {
                const scrollDiv = document.querySelector('.config-table-scroll');
                if (scrollDiv) {
                    scrollDiv.scrollTop = scrollDiv.scrollHeight;
                }
            }, 10);
        }

        function removeRow(index) {
            syncTableToModifiers();                     // 保存当前所有输入
            modifiers.splice(index, 1);                 // 删除目标行
            renderTable();
        }

        // 保存设置 → 无弹窗，仅显示 toast 提示，自动收起面板
        function saveConfig() {
            triggerProb = parseFloat(document.getElementById('triggerProbInput').value) || 0;
            const texts = document.querySelectorAll('.mod-text');
            const weights = document.querySelectorAll('.mod-weight');
            const newMod = [];
            for(let i = 0; i < texts.length; i++) { 
                const val = texts[i].value.trim();
                if (val !== "") newMod.push({ text: val, weight: parseInt(weights[i].value) });
            }
            modifiers = newMod;
            localStorage.setItem('challenge_trigger_prob_v7', triggerProb);
            localStorage.setItem('challenge_modifiers_v7', JSON.stringify(modifiers));
            renderTable();                     // 刷新表格（过滤后可能变少）

            showToast('✓ 保存完毕', 5000);
            document.getElementById('config-container').style.display = 'none';
        }

        // 导出配置 (复制紧凑格式)
        function exportConfig() {
            const compactData = { 
                p: triggerProb, 
                m: modifiers.map(({ text, weight }) => [text, weight]) 
            };
            const jsonStr = JSON.stringify(compactData);
            const encoded = btoa(unescape(encodeURIComponent(jsonStr)));
            const el = document.createElement("textarea");
            el.value = encoded;
            document.body.appendChild(el);
            el.select();
            document.execCommand("copy");
            document.body.removeChild(el);
            alert("已复制紧凑配置");
        }

        // 导入配置 (粘贴)
        function importConfig() {
            const str = prompt("粘贴配置："); 
            if (!str) return;
            try {
                const raw = JSON.parse(decodeURIComponent(escape(atob(str))));
                let newTriggerProb, newModifiers;

                if (raw.triggerProb !== undefined && Array.isArray(raw.modifiers)) {
                    newTriggerProb = raw.triggerProb;
                    newModifiers = raw.modifiers;
                } else if (raw.p !== undefined && Array.isArray(raw.m)) {
                    newTriggerProb = raw.p;
                    newModifiers = raw.m.map(item => ({ text: item[0], weight: item[1] }));
                } else {
                    throw new Error('无法识别的配置格式');
                }

                triggerProb = newTriggerProb;
                modifiers = newModifiers;

                updateConfigUI();
                renderTable();
                saveConfig();  // 自动保存并关闭面板
            } catch (e) {
                alert("无效配置或解析失败");
                console.error(e);
            }
        }

        // ---------- 新增：导出成文件 ----------
        function exportToFile() {
            const compactData = { 
                p: triggerProb, 
                m: modifiers.map(({ text, weight }) => [text, weight]) 
            };
            const jsonStr = JSON.stringify(compactData, null, 2);  // 保留缩进，方便阅读
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `随机挑战配置_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('📥 配置文件已下载', 3000);
        }

        // ---------- 新增：从文件导入 ----------
        function importFromFile() {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.json,application/json';
            fileInput.style.display = 'none';
            document.body.appendChild(fileInput);

            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) {
                    document.body.removeChild(fileInput);
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        const raw = JSON.parse(ev.target.result);
                        let newTriggerProb, newModifiers;

                        if (raw.triggerProb !== undefined && Array.isArray(raw.modifiers)) {
                            newTriggerProb = raw.triggerProb;
                            newModifiers = raw.modifiers;
                        } else if (raw.p !== undefined && Array.isArray(raw.m)) {
                            newTriggerProb = raw.p;
                            newModifiers = raw.m.map(item => ({ text: item[0], weight: item[1] }));
                        } else {
                            throw new Error('文件格式不正确');
                        }

                        triggerProb = newTriggerProb;
                        modifiers = newModifiers;

                        updateConfigUI();
                        renderTable();
                        saveConfig();  // 自动保存并关闭面板
                        showToast('📂 配置已导入并保存', 5000);
                    } catch (err) {
                        alert('解析文件失败：' + err.message);
                    } finally {
                        document.body.removeChild(fileInput);
                    }
                };
                reader.readAsText(file);
            });

            fileInput.click();
        }

        // 抽取主逻辑 (已集成10次内不重复 + 再抽累积)
        function generateResults() {
            const rollBtn = document.getElementById('rollBtn');

            // ① 如果需要重置（上次抽到普通词条），则先将按钮恢复为“随一下”，清空累积
            if (shouldResetOnNextRoll) {
                rollBtn.innerText = '随一下';
                accumulatedParts = [];
                shouldResetOnNextRoll = false;
            }

            // ② 原有抽取逻辑：得到 tMod 和 modIndex
            let tMod = null, modIndex = -1;
            if (Math.random() * 100 <= triggerProb && modifiers.length > 0) {
                // 构建候选列表：排除最近10次出现过的词条（基于文本）
                let candidates = modifiers.filter(mod => !recentHistory.includes(mod.text));
                if (candidates.length === 0) {
                    candidates = modifiers; // 全部被排除，则允许重复
                }
                // 按权重随机抽取
                let totalWeight = candidates.reduce((sum, m) => sum + m.weight, 0);
                let r = Math.random() * totalWeight;
                for (let i = 0; i < candidates.length; i++) {
                    if (r < candidates[i].weight) {
                        tMod = candidates[i];
                        modIndex = modifiers.findIndex(m => m.text === tMod.text);
                        break;
                    }
                    r -= candidates[i].weight;
                }
            }

            // ③ 根据抽取结果更新累积状态、按钮文字 (同时保留原词条显示)
            const mEl = document.getElementById('res-modifier');

            if (tMod === null) {
                // 未触发：只更新结果区域和历史，【不改动累积、按钮、重置标志】
                mEl.innerText = '【无】';
                mEl.style = '';
                mEl.className = 'modifier-result mod-none';
                addHistory(null, -1);
                return; // 直接返回，保持按钮及累积不变
            }

            // ---------- 有词条抽取结果 ----------
            const rawText = tMod.text;
            const isSpecial = (rawText.startsWith('再抽') || rawText.startsWith('再来')) && rawText.includes('+');

            if (isSpecial) {
                // 提取加号后面的部分作为累积片段
                const plusIndex = rawText.indexOf('+');
                let part = rawText.substring(plusIndex + 1).trim();
                // 如果提取部分为空，则视作普通词条处理（不参与累积）
                if (part === '') {
                    // 当做普通词条处理
                    applyAsNormal(tMod, modIndex, mEl);
                } else {
                    // 真正的特殊词条：推入累积，更新按钮，关闭重置标志
                    accumulatedParts.push(part);
                    rollBtn.innerText = accumulatedParts.join(' + ');
                    shouldResetOnNextRoll = false;   // 连续特殊不重置

                    // 结果区域仍然显示原词条
                    const colors = colorPalette[modIndex % colorPalette.length];
                    mEl.innerText = rawText;
                    mEl.className = 'modifier-result';
                    mEl.style.color = colors.text;
                    mEl.style.backgroundColor = colors.bg;
                    mEl.style.border = `2px dashed ${colors.border}`;

                    addHistory(tMod, modIndex);
                }
            } else {
                // 普通词条 (包括不以“再抽/再来”开头，或没有加号)
                applyAsNormal(tMod, modIndex, mEl);
            }

            // 封装普通词条处理逻辑 (便于复用)
            function applyAsNormal(mod, idx, el) {
                // 普通词条：按钮显示当前累积（如果有），否则显示“随一下”；并设置下次需要重置
                if (accumulatedParts.length > 0) {
                    rollBtn.innerText = accumulatedParts.join(' + ');
                } else {
                    rollBtn.innerText = '随一下';   // 无累积时保持原样
                }
                shouldResetOnNextRoll = true;   // 下次点击必须先重置

                // 结果区域显示普通词条
                const colors = colorPalette[idx % colorPalette.length];
                el.innerText = mod.text;
                el.className = 'modifier-result';
                el.style.color = colors.text;
                el.style.backgroundColor = colors.bg;
                el.style.border = `2px dashed ${colors.border}`;

                addHistory(mod, idx);
            }
        }

        // 新增历史记录，同时维护最近10次列表 (完全保持原样)
        function addHistory(m, modIndex) {
            const tbody = document.getElementById('history-body');
            const tr = document.createElement('tr');
            const time = new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
            let mHtml = m ? `<span style="color:${colorPalette[modIndex % colorPalette.length].text}; font-weight:bold;">${m.text}</span>` : '<span style="color:#a0aec0;">无</span>';
            tr.innerHTML = `<td>${time}</td><td>${mHtml}</td>`;
            tbody.insertBefore(tr, tbody.firstChild);

            // 更新最近10次历史记录（只保留有词条的结果）
            if (m) {
                recentHistory.push(m.text);
                if (recentHistory.length > 10) recentHistory.shift();
            }
        }

        // 清空历史（同时清空最近记录）
        function clearHistory() { 
            if(confirm("清空记录？")) {
                document.getElementById('history-body').innerHTML = '';
                recentHistory = [];
            }
        }
    </script>
</body>
</html>
